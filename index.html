<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Controle de Despesas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    padding:15px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.section-title{
    margin-top:25px;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

.form-grid{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input,
select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    border:none;
    padding:14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.primary{
    background:#007bff;
    color:white;
}

.success{
    background:#28a745;
    color:white;
}

.danger{
    background:red;
    color:white;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#efefef;
}

.total{
    margin-top:20px;
    font-size:22px;
    text-align:right;
    font-weight:bold;
}

.link-comprovante{
    color:#007bff;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:768px){

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

    button{
        width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>Controle de Despesas</h1>

<div class="section-title">
    Dados da Viagem
</div>

<div class="form-grid">

    <div class="field">

        <label>Implantador</label>

        <select id="funcionario">

            <option value="">
                Carregando...
            </option>

        </select>

    </div>

    <div class="field">

        <label>Cliente</label>

        <select id="cliente">

            <option value="">
                Selecione
            </option>

        </select>

    </div>

    <div class="field">

        <label>Novo Cliente</label>

        <input
            type="text"
            id="novoCliente"
            placeholder="Opcional"
        >

    </div>

    <div class="field">

        <label>Data Início</label>

        <input
            type="date"
            id="dataInicio"
        >

    </div>

    <div class="field">

        <label>Data Final</label>

        <input
            type="date"
            id="dataFim"
        >

    </div>

</div>

<div class="section-title">
    Nova Despesa
</div>

<div class="form-grid">

    <div class="field">

        <label>Data Cupom</label>

        <input
            type="date"
            id="dataCupom"
        >

    </div>

    <div class="field">

        <label>Categoria</label>

        <select id="categoria">

            <option>Refeição</option>
            <option>Hotel</option>
            <option>Combustível</option>
            <option>Pedágio</option>
            <option>Táxi/Uber</option>
            <option>Outros</option>

        </select>

    </div>

    <div class="field">

        <label>Descrição</label>

        <input
            type="text"
            id="descricao"
        >

    </div>

    <div class="field">

        <label>Valor</label>

        <input
            type="number"
            step="0.01"
            id="valor"
        >

    </div>

    <div class="field">

        <label>Comprovante</label>

        <input
            type="file"
            id="imagem"
            accept="image/*"
            capture="environment"
        >

    </div>

</div>

<div class="actions">

    <button
        class="primary"
        onclick="salvarDespesa()"
    >
        Salvar Despesa
    </button>

    <button
        class="success"
        onclick="exportarPDF()"
    >
        Gerar PDF
    </button>

</div>

<table>

<thead>

<tr>

    <th>Data</th>
    <th>Categoria</th>
    <th>Descrição</th>
    <th>Valor</th>
    <th>Comprovante</th>
    <th>Ação</th>

</tr>

</thead>

<tbody id="tabelaDespesas"></tbody>

</table>

<div
    class="total"
    id="total"
>
    Total: R$ 0,00
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyV5bpziX9YjcXY1nLM6-gmZCBAEXtpJS5pwhWDHjrXaPSkX5Uj_7gBIpWkWAOyCvkp/exec";

let despesas = [];

window.onload = async function(){

    await carregarImplantadores();
};

function normalizarNome(texto){

    return texto
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"_")
        .toUpperCase();
}

async function carregarImplantadores(){

    const response = await fetch(
        `${API_URL}?action=implantadores`
    );

    const implantadores =
        await response.json();

    const select =
        document.getElementById(
            "funcionario"
        );

    select.innerHTML =
        `<option value="">Selecione</option>`;

    implantadores.forEach(nome=>{

        select.innerHTML += `
            <option value="${nome}">
                ${nome}
            </option>
        `;
    });
}

document
.getElementById("funcionario")
.addEventListener(
    "change",
    carregarClientes
);

async function carregarClientes(){

    const funcionario =
        document.getElementById(
            "funcionario"
        ).value;

    if(!funcionario) return;

    const response = await fetch(
        `${API_URL}?action=clientes&funcionario=${funcionario}`
    );

    const clientes =
        await response.json();

    const select =
        document.getElementById(
            "cliente"
        );

    select.innerHTML =
        `<option value="">Selecione</option>`;

    clientes.forEach(cliente=>{

        select.innerHTML += `
            <option value="${cliente}">
                ${cliente}
            </option>
        `;
    });
}

async function salvarDespesa(){

    const funcionario =
        normalizarNome(
            document.getElementById(
                "funcionario"
            ).value
        );

    let cliente =
        document.getElementById(
            "cliente"
        ).value;

    const novoCliente =
        document.getElementById(
            "novoCliente"
        ).value;

    if(novoCliente){

        cliente = novoCliente;
    }

    cliente = normalizarNome(cliente);

    const dataInicio =
        document.getElementById(
            "dataInicio"
        ).value;

    const dataFim =
        document.getElementById(
            "dataFim"
        ).value;

    const dataCupom =
        document.getElementById(
            "dataCupom"
        ).value;

    const categoria =
        document.getElementById(
            "categoria"
        ).value;

    const descricao =
        normalizarNome(
            document.getElementById(
                "descricao"
            ).value
        );

    const valor =
        document.getElementById(
            "valor"
        ).value;

    const imagem =
        document.getElementById(
            "imagem"
        ).files[0];

    if(
        !funcionario ||
        !cliente ||
        !dataInicio ||
        !dataFim ||
        !dataCupom ||
        !descricao ||
        !valor ||
        !imagem
    ){
        alert("Preencha todos os campos");
        return;
    }

    const formData = new FormData();

    formData.append(
        "action",
        "uploadComprovante"
    );

    formData.append(
        "funcionario",
        funcionario
    );

    formData.append(
        "cliente",
        cliente
    );

    formData.append(
        "dataInicio",
        dataInicio
    );

    formData.append(
        "dataFim",
        dataFim
    );

    formData.append(
        "dataCupom",
        dataCupom
    );

    formData.append(
        "categoria",
        categoria
    );

    formData.append(
        "descricao",
        descricao
    );

    formData.append(
        "valor",
        valor
    );

    formData.append(
        "imagem",
        imagem
    );

    try{

        const response = await fetch(
            API_URL,
            {
                method:"POST",
                body:formData
            }
        );

        const resultado =
            await response.json();

        if(!resultado.success){

            alert(resultado.message);
            return;
        }

        despesas.push({

            dataCupom,
            categoria,
            descricao,
            valor,
            imagemUrl:resultado.url

        });

        renderizarTabela();

        limparFormulario();

    }catch(error){

        console.error(error);

        alert(
            "Erro ao salvar despesa"
        );
    }
}

function renderizarTabela(){

    const tabela =
        document.getElementById(
            "tabelaDespesas"
        );

    tabela.innerHTML = "";

    let total = 0;

    despesas.forEach((d,index)=>{

        total += parseFloat(d.valor);

        tabela.innerHTML += `

        <tr>

            <td>${d.dataCupom}</td>

            <td>${d.categoria}</td>

            <td>${d.descricao}</td>

            <td>
                R$ ${parseFloat(
                    d.valor
                ).toFixed(2)}
            </td>

            <td>

                <a
                    href="${d.imagemUrl}"
                    target="_blank"
                    class="link-comprovante"
                >
                    Abrir
                </a>

            </td>

            <td>

                <button
                    class="danger"
                    onclick="removerDespesa(${index})"
                >
                    Excluir
                </button>

            </td>

        </tr>

        `;
    });

    document.getElementById(
        "total"
    ).innerHTML =
    `Total: R$ ${total.toFixed(2)}`;
}

function removerDespesa(index){

    despesas.splice(index,1);

    renderizarTabela();
}

function limparFormulario(){

    document.getElementById(
        "dataCupom"
    ).value = "";

    document.getElementById(
        "descricao"
    ).value = "";

    document.getElementById(
        "valor"
    ).value = "";

    document.getElementById(
        "imagem"
    ).value = "";
}

async function exportarPDF(){

    if(despesas.length === 0){

        alert(
            "Nenhuma despesa cadastrada"
        );

        return;
    }

    const funcionario =
        document.getElementById(
            "funcionario"
        ).value;

    const cliente =
        document.getElementById(
            "cliente"
        ).value;

    const dataInicio =
        document.getElementById(
            "dataInicio"
        ).value;

    const dataFim =
        document.getElementById(
            "dataFim"
        ).value;

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    doc.setFontSize(16);

    doc.text(
        "Relatório de Despesas",
        10,
        10
    );

    doc.setFontSize(10);

    doc.text(
        `Implantador: ${funcionario}`,
        10,
        20
    );

    doc.text(
        `Cliente: ${cliente}`,
        10,
        26
    );

    doc.text(
        `Período: ${dataInicio} até ${dataFim}`,
        10,
        32
    );

    let y = 45;

    despesas.forEach((d,index)=>{

        doc.text(
            `${index+1}. ${d.dataCupom} | ${d.categoria} | ${d.descricao} | R$ ${d.valor}`,
            10,
            y
        );

        y += 8;
    });

    doc.save("relatorio.pdf");

    const pdfBlob =
        doc.output("blob");

    const formData =
        new FormData();

    formData.append(
        "action",
        "uploadPDF"
    );

    formData.append(
        "funcionario",
        normalizarNome(funcionario)
    );

    formData.append(
        "cliente",
        normalizarNome(cliente)
    );

    formData.append(
        "dataInicio",
        dataInicio
    );

    formData.append(
        "dataFim",
        dataFim
    );

    formData.append(
        "pdf",
        pdfBlob,
        "relatorio.pdf"
    );

    await fetch(API_URL,{
        method:"POST",
        body:formData
    });

    alert(
        "PDF enviado para o Drive"
    );
}

</script>

</body>
</html>
